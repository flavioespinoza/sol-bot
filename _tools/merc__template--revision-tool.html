<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revision Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #bdbdbd;
    color: #1a1a1a;
    padding: 24px;
    line-height: 1.6;
  }
  h1 { color: #1a1a1a; font-size: 24px; margin-bottom: 8px; font-weight: 700; }
  .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
  .controls-bar {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .controls-bar button {
    padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px;
    background: #fff; color: #374151; cursor: pointer; font-size: 13px;
    transition: background 0.15s;
  }
  .controls-bar button:hover { background: #f3f4f6; }
  .controls-bar .danger { border-color: #ef4444; color: #ef4444; }
  .controls-bar .danger:hover { background: #fef2f2; }
  .section-header {
    background: #e0e0e0; border: 1px solid #d0d0d0; border-radius: 8px;
    padding: 16px 20px; margin: 32px 0 16px 0;
  }
  .section-header h2 { color: #1a1a1a; font-size: 18px; margin-bottom: 8px; font-weight: 700; }
  .section-header .rules { color: #6b7280; font-size: 13px; margin-bottom: 8px; }
  .scale-table { font-size: 12px; color: #6b7280; margin-top: 8px; }
  .scale-table div { margin-bottom: 2px; }
  .scale-table strong { color: #1a1a1a; }
  .field-card {
    background: #e0e0e0; border: 1px solid #d0d0d0; border-radius: 8px;
    padding: 20px; margin-bottom: 16px;
  }
  .field-card h3 { color: #1a1a1a; font-size: 15px; margin-bottom: 4px; font-weight: 700; }
  .field-meta { font-size: 12px; color: #6b7280; margin-bottom: 12px; }
  .rating-select-wrap { display: inline-block; margin-left: 8px; vertical-align: middle; }
  .rating-select {
    padding: 3px 8px; border-radius: 6px; font-size: 13px; font-weight: 600;
    border: 1px solid #d1d5db; cursor: pointer; appearance: auto;
  }
  .rating-1 { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
  .rating-2 { background: #e0f2fe; color: #0369a1; border-color: #7dd3fc; }
  .rating-3 { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
  .rating-4 { background: #dcfce7; color: #166534; border-color: #86efac; }
  .rating-5 { background: #fef9c3; color: #854d0e; border-color: #fde047; }
  .rating-0 { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
  .rating-6 { background: #fde68a; color: #92400e; border-color: #fbbf24; }
  .rating-7 { background: #fbbf24; color: #78350f; border-color: #f59e0b; }
  .rating-meaning {
    display: inline-block; margin-left: 6px; font-size: 12px;
    color: #6b7280; vertical-align: middle;
  }
  .draft-label {
    font-size: 12px; font-weight: 600; color: #6b7280;
    text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 6px 0;
  }
  .draft-content {
    background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px;
    padding: 12px 16px; font-size: 13px; line-height: 1.7; color: #374151;
    max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word;
  }
  .revision-area { position: relative; margin-top: 4px; }
  .revision-area textarea {
    width: 100%; min-height: 140px; background: #fff;
    border: 1px solid #22c55e; border-radius: 6px; padding: 12px 16px;
    font-family: inherit; font-size: 13px; line-height: 1.7;
    color: #1a1a1a; resize: vertical;
  }
  .revision-area textarea:focus {
    outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px #2563eb22;
  }
  .revision-area textarea::placeholder { color: #9ca3af; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
  .btn-copy, .btn-clear-field {
    padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
    transition: background 0.15s; border: 1px solid #d1d5db; background: #fff; color: #374151;
  }
  .btn-copy:hover { background: #f3f4f6; }
  .btn-copy.copied { background: #22c55e; border-color: #22c55e; color: #fff; }
  .btn-clear-field { color: #9ca3af; }
  .btn-clear-field:hover { background: #f3f4f6; }
  .word-count { font-size: 11px; color: #9ca3af; margin-top: 4px; }
  .hidden { display: none !important; }
  .saved-indicator {
    position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: #fff;
    padding: 8px 16px; border-radius: 6px; font-size: 13px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .saved-indicator.show { opacity: 1; }
  .transcript-section {
    margin-top: 16px; border-top: 1px solid #d0d0d0; padding-top: 12px;
  }
  .transcript-section .draft-label { margin-top: 0; margin-bottom: 8px; }
  .transcript-item {
    background: #f5f5f5; border: 1px solid #d0d0d0; border-radius: 6px;
    padding: 10px 14px; margin-bottom: 8px; position: relative;
  }
  .transcript-item .transcript-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;
  }
  .transcript-item .issue-label { font-size: 12px; font-weight: 700; color: #374151; }
  .transcript-item .transcript-text {
    font-size: 12px; line-height: 1.6; color: #4b5563;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .transcript-item .btn-copy-transcript {
    position: absolute; top: 8px; right: 8px;
    padding: 3px 10px; border: 1px solid #d1d5db; border-radius: 4px;
    background: #fff; color: #6b7280; font-size: 11px; cursor: pointer;
  }
  .transcript-item .btn-copy-transcript:hover { background: #f3f4f6; }
  .badge-severity {
    display: inline-block; padding: 1px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 600;
  }
  .sev-major { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .sev-minor { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
  .sev-observation { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  .empty-state {
    background: #fff; border: 2px dashed #d0d0d0; border-radius: 8px;
    padding: 48px; text-align: center; color: #888; font-size: 14px;
    margin-bottom: 32px;
  }
  .empty-state code { display: block; margin-top: 12px; font-size: 12px; color: #555; }
  .paste-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 100; justify-content: center; align-items: center;
  }
  .paste-overlay.show { display: flex; }
  .paste-box {
    background: #fff; border-radius: 12px; padding: 24px; width: 600px;
    max-height: 80vh; display: flex; flex-direction: column; gap: 12px;
  }
  .paste-box h2 { font-size: 18px; font-weight: 600; }
  .paste-box textarea {
    width: 100%; height: 300px; font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px; border: 1px solid #d1d5db; border-radius: 6px; padding: 12px; resize: vertical;
  }
  .paste-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .paste-box button {
    padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer;
    border: 1px solid #d1d5db; background: #fff; color: #374151;
  }
  .paste-box button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .paste-box .error { color: #dc2626; font-size: 12px; min-height: 18px; }
</style>
</head>
<body>

<h1 id="page-title">Revision Tool</h1>
<p class="subtitle">All paragraph fields with Claude's draft + your revision. Saves to localStorage.</p>

<div class="controls-bar">
  <button onclick="showPasteOverlay()">Import JSON</button>
  <button onclick="exportJSON()">Export JSON</button>
  <button onclick="copyAllRevisions()">Copy All Revisions</button>
  <button class="danger" onclick="clearAllRevisions()">Clear All Revisions</button>
</div>

<div id="app"></div>
<div id="saved-indicator" class="saved-indicator">Saved</div>

<!-- Paste JSON overlay -->
<div id="paste-overlay" class="paste-overlay">
  <div class="paste-box">
    <h2>Import JSON Data</h2>
    <textarea id="paste-area" placeholder='Paste your JSON here...'></textarea>
    <div id="paste-error" class="error"></div>
    <div class="btn-row">
      <button onclick="hidePasteOverlay()">Cancel</button>
      <button class="primary" onclick="loadFromPaste()">Load</button>
    </div>
  </div>
</div>

<!--
  DATA BLOCK — Claude Code fills this JSON for each task.
  See merc__template--revision-tool--schema.json for the data shape.
-->
<script id="task-data" type="application/json">
{
  "taskId": "",
  "fields": {},
  "transcripts": {}
}
</script>

<script>
const DATA_KEY = 'merc_revision_tool_data';

/* ===== CONSTANT FIELD DEFINITIONS (same for every Mercor task) ===== */

const FIELD_DEFS = [
  { section: 2, id: 'model_a_task_success', title: 'Model A \u2014 Task Success Comments', description: 'Reasoning for the Task Success rating with specific examples.' },
  { section: 2, id: 'model_a_interaction_quality', title: 'Model A \u2014 Interaction Quality Comments', description: 'Reasoning for the Interaction Quality rating with specific examples.' },
  { section: 2, id: 'model_a_code_quality', title: 'Model A \u2014 Code Quality Comments', description: 'Reasoning for the Code Quality rating with specific examples.' },
  { section: 2, id: 'model_a_thoroughness', title: 'Model A \u2014 Thoroughness Comments', description: 'Reasoning for the Thoroughness rating with specific examples.' },
  { section: 2, id: 'model_b_task_success', title: 'Model B \u2014 Task Success Comments', description: 'Reasoning for the Task Success rating with specific examples.' },
  { section: 2, id: 'model_b_interaction_quality', title: 'Model B \u2014 Interaction Quality Comments', description: 'Reasoning for the Interaction Quality rating with specific examples.' },
  { section: 2, id: 'model_b_code_quality', title: 'Model B \u2014 Code Quality Comments', description: 'Reasoning for the Code Quality rating with specific examples.' },
  { section: 2, id: 'model_b_thoroughness', title: 'Model B \u2014 Thoroughness Comments', description: 'Reasoning for the Thoroughness rating with specific examples.' },
  { section: 3, id: 'overall_preference', title: 'Overall Preference Feedback', description: 'Overall, which output did you like more? Why?' },
  { section: 3, id: 'instruction_following', title: 'Instruction Following Feedback', description: 'Which model followed instructions better? Why?' },
  { section: 3, id: 'time_to_resolution', title: 'Time to Resolution Feedback', description: 'Which model got you to the solution faster? Why?' },
  { section: 3, id: 'vibes', title: 'Vibes Feedback', description: 'Which model had a more preferable vibe? Why?' },
  { section: 4, id: 'general_feedback', title: 'General Feedback on Model Interaction', description: 'Holistic observations on how each model behaves, handles feedback, level of verbosity, or specific "quirks." Must reference specific models by name (A/B). This is comparative.' }
];

const SCALES = {
  2: {
    name: 'Individual Model Evaluation (1\u20135)',
    rules: 'Rate each model independently. Minimum 3 sentences per comment field, citing specific examples or quotes from the transcript. Model A data never mentions Model B and vice versa.',
    items: [
      { label: 'Task Success', scale: '1 = Failed completely | 2 = Partial success with major issues | 3 = Completed but with notable problems | 4 = Successful with minor issues | 5 = Completely successful' },
      { label: 'Interaction Quality', scale: '1 = Critical Blocker | 2 = Major issue, overcame with prompting | 3 = Periodic issues, not a major impediment | 4 = Only noticeable when paying close attention | 5 = No behavioral issues' },
      { label: 'Code Quality', scale: '1 = Critically bad, unacceptable deviation | 2 = Mediocre, noticeably inconsistent | 3 = Adequate | 4 = Good, inline with codebase | 5 = Excellent, indistinguishable from codebase' },
      { label: 'Thoroughness', scale: '1 = Failed most tasks, constant user input | 2 = Failed many tasks, frequent user input | 3 = Solved most tasks, occasional user input | 4 = Solved nearly all, minimal user input | 5 = Complete understanding, no user input needed' }
    ]
  },
  3: {
    name: 'Model Preference (Comparative, 0\u20137)',
    rules: 'Rankings compare the two models against each other. Minimum 3 sentences per feedback field, citing specific examples from BOTH interactions. State what each model did separately, then state the pattern.',
    items: [
      { label: 'Scale', scale: '0 = Strong A | 1\u20132 = Moderate A | 3\u20134 = Slight/tie | 5\u20136 = Moderate B | 7 = Strong B' }
    ]
  },
  4: {
    name: 'General Feedback on Model Interaction',
    rules: 'Holistic observations on how each model behaves, handles feedback, level of verbosity, or specific "quirks." Must reference specific models by name (A/B). This is comparative \u2014 state what each model did separately, then state the pattern.',
    items: []
  }
};

const SCALE_1_5 = { 1: 'Failed completely', 2: 'Partial success with major issues', 3: 'Completed but with notable problems', 4: 'Successful with minor issues', 5: 'Completely successful' };
const SCALE_1_5_INTERACTION = { 1: 'Critical Blocker', 2: 'Major issue, overcame with prompting', 3: 'Periodic issues, not a major impediment', 4: 'Only noticeable when paying close attention', 5: 'No behavioral issues' };
const SCALE_1_5_CODE = { 1: 'Critically bad, unacceptable deviation', 2: 'Mediocre, noticeably inconsistent', 3: 'Adequate', 4: 'Good, inline with codebase', 5: 'Excellent, indistinguishable from codebase' };
const SCALE_1_5_THOROUGHNESS = { 1: 'Failed most tasks, constant user input', 2: 'Failed many tasks, frequent user input', 3: 'Solved most tasks, occasional user input', 4: 'Solved nearly all, minimal user input', 5: 'Complete understanding, no user input needed' };
const SCALE_0_7 = { 0: 'Strong preference for A', 1: 'Moderate preference for A', 2: 'Moderate preference for A', 3: 'Slight preference / tie', 4: 'Slight preference / tie', 5: 'Moderate preference for B', 6: 'Moderate preference for B', 7: 'Strong preference for B' };

const FIELD_SCALES = {
  model_a_task_success: SCALE_1_5,
  model_b_task_success: SCALE_1_5,
  model_a_interaction_quality: SCALE_1_5_INTERACTION,
  model_b_interaction_quality: SCALE_1_5_INTERACTION,
  model_a_code_quality: SCALE_1_5_CODE,
  model_b_code_quality: SCALE_1_5_CODE,
  model_a_thoroughness: SCALE_1_5_THOROUGHNESS,
  model_b_thoroughness: SCALE_1_5_THOROUGHNESS,
  overall_preference: SCALE_0_7,
  instruction_following: SCALE_0_7,
  time_to_resolution: SCALE_0_7,
  vibes: SCALE_0_7
};

/* ===== DATA LOADING ===== */

function getData() {
  const stored = localStorage.getItem(DATA_KEY);
  if (stored) {
    try { return JSON.parse(stored); } catch {}
  }
  const block = document.getElementById('task-data');
  try { return JSON.parse(block.textContent); } catch {}
  return { taskId: '', fields: {}, transcripts: {} };
}

function saveData(data) {
  localStorage.setItem(DATA_KEY, JSON.stringify(data));
}

function revKey() {
  const data = getData();
  return 'merc_revision_revisions_' + (data.taskId || 'default');
}

function ratingsKey() {
  const data = getData();
  return 'merc_revision_ratings_' + (data.taskId || 'default');
}

function loadRevisions() {
  try { return JSON.parse(localStorage.getItem(revKey()) || '{}'); } catch { return {}; }
}

function saveRevision(id, value) {
  const r = loadRevisions();
  r[id] = value;
  localStorage.setItem(revKey(), JSON.stringify(r));
  flashSaved();
}

function loadRatings() {
  try { return JSON.parse(localStorage.getItem(ratingsKey()) || '{}'); } catch { return {}; }
}

function saveRating(id, value) {
  const ratings = loadRatings();
  ratings[id] = parseInt(value);
  localStorage.setItem(ratingsKey(), JSON.stringify(ratings));
  const select = document.getElementById('rating-sel-' + id);
  const meaning = document.getElementById('rating-meaning-' + id);
  select.className = 'rating-select rating-' + value;
  const scale = FIELD_SCALES[id];
  if (scale && meaning) meaning.textContent = scale[value] || '';
  flashSaved();
}

function flashSaved() {
  const el = document.getElementById('saved-indicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}

function countWords(text) {
  return text.trim() ? text.trim().split(/\s+/).length : 0;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

/* ===== IMPORT / EXPORT ===== */

function showPasteOverlay() {
  document.getElementById('paste-area').value = JSON.stringify(getData(), null, 2);
  document.getElementById('paste-error').textContent = '';
  document.getElementById('paste-overlay').classList.add('show');
}

function hidePasteOverlay() {
  document.getElementById('paste-overlay').classList.remove('show');
}

function loadFromPaste() {
  const raw = document.getElementById('paste-area').value;
  try {
    const data = JSON.parse(raw);
    if (!data.fields || typeof data.fields !== 'object') {
      document.getElementById('paste-error').textContent = 'JSON must have a "fields" object.';
      return;
    }
    saveData(data);
    hidePasteOverlay();
    render();
  } catch (e) {
    document.getElementById('paste-error').textContent = 'Invalid JSON: ' + e.message;
  }
}

function exportJSON() {
  const data = getData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (data.taskId || 'revision-tool') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

/* ===== ACTIONS ===== */

function copyText(id) {
  const textarea = document.getElementById('rev-' + id);
  const btn = document.getElementById('btn-' + id);
  if (!textarea.value.trim()) return;
  navigator.clipboard.writeText(textarea.value).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function clearField(id) {
  const textarea = document.getElementById('rev-' + id);
  textarea.value = '';
  saveRevision(id, '');
  updateWordCount(id);
}

function updateWordCount(id) {
  const textarea = document.getElementById('rev-' + id);
  const wc = document.getElementById('wc-' + id);
  wc.textContent = countWords(textarea.value) + ' words';
}

function copyTranscript(text) {
  navigator.clipboard.writeText(text);
}

function copyAllRevisions() {
  const revisions = loadRevisions();
  const lines = [];
  FIELD_DEFS.forEach(f => {
    const val = revisions[f.id] || '';
    if (val.trim()) {
      lines.push('## ' + f.title);
      lines.push('');
      lines.push(val.trim());
      lines.push('');
      lines.push('---');
      lines.push('');
    }
  });
  if (lines.length === 0) { alert('No revisions to copy.'); return; }
  navigator.clipboard.writeText(lines.join('\n'));
  flashSaved();
}

function clearAllRevisions() {
  if (!confirm('Clear ALL your revisions? This cannot be undone.')) return;
  localStorage.removeItem(revKey());
  document.querySelectorAll('textarea').forEach(t => { t.value = ''; });
  document.querySelectorAll('[id^="wc-"]').forEach(w => { w.textContent = '0 words'; });
}

function sevClass(severity) {
  if (severity === 'Major') return 'sev-major';
  if (severity === 'Minor') return 'sev-minor';
  return 'sev-observation';
}

/* ===== RENDER ===== */

function render() {
  const data = getData();
  const fieldData = data.fields || {};
  const transcriptData = data.transcripts || {};
  const revisions = loadRevisions();
  const savedRatings = loadRatings();

  // Title
  const title = data.taskId ? data.taskId + ' \u2014 Revision Tool' : 'Revision Tool';
  document.getElementById('page-title').textContent = title;
  document.title = title;

  // Check if any data exists
  const hasData = Object.keys(fieldData).some(k => {
    const f = fieldData[k];
    return f && (f.draft || f.rating);
  });

  if (!hasData) {
    document.getElementById('app').innerHTML =
      '<div class="empty-state">No data loaded.<br>Click <strong>Import JSON</strong> to paste field data, or have Claude Code fill the JSON block.<code>See merc__template--revision-tool--schema.json for the data shape.</code></div>';
    return;
  }

  let html = '';
  let lastSection = null;

  FIELD_DEFS.forEach(f => {
    const fd = fieldData[f.id] || {};
    const draft = fd.draft || '';
    const defaultRating = fd.rating;

    // Section header
    if (f.section !== lastSection) {
      lastSection = f.section;
      const s = SCALES[f.section];
      html += '<div class="section-header">';
      html += '<h2>Section ' + f.section + ': ' + s.name + '</h2>';
      html += '<div class="rules">' + s.rules + '</div>';
      if (s.items.length > 0) {
        html += '<div class="scale-table">';
        s.items.forEach(item => {
          html += '<div><strong>' + item.label + ':</strong> ' + item.scale + '</div>';
        });
        html += '</div>';
      }
      html += '</div>';
    }

    const savedVal = revisions[f.id] || '';
    const wc = countWords(savedVal);
    const scale = FIELD_SCALES[f.id];
    const currentRating = savedRatings[f.id] !== undefined ? savedRatings[f.id] : defaultRating;

    html += '<div class="field-card">';

    // Title + rating selector
    html += '<h3>' + f.title;
    if (scale && currentRating !== null && currentRating !== undefined) {
      const isPreference = f.section === 3;
      const minVal = isPreference ? 0 : 1;
      const maxVal = isPreference ? 7 : 5;
      html += '<span class="rating-select-wrap">';
      html += '<select id="rating-sel-' + f.id + '" class="rating-select rating-' + currentRating + '" onchange="saveRating(\'' + f.id + '\', this.value)">';
      for (let i = minVal; i <= maxVal; i++) {
        html += '<option value="' + i + '"' + (i === currentRating ? ' selected' : '') + '>' + i + '</option>';
      }
      html += '</select>';
      html += '<span id="rating-meaning-' + f.id + '" class="rating-meaning">' + (scale[currentRating] || '') + '</span>';
      html += '</span>';
    }
    html += '</h3>';
    html += '<div class="field-meta">' + f.description + '</div>';

    // Claude's draft (full width)
    if (draft) {
      html += '<div class="draft-label">Claude Draft</div>';
      html += '<div class="draft-content">' + escapeHtml(draft) + '</div>';
    }

    // Revision textarea
    html += '<div class="draft-label">Your Final Revision</div>';
    html += '<div class="revision-area">';
    html += '<textarea id="rev-' + f.id + '" placeholder="Write your final version here..." oninput="saveRevision(\'' + f.id + '\', this.value); updateWordCount(\'' + f.id + '\')">' + escapeHtml(savedVal) + '</textarea>';
    html += '<div class="btn-row">';
    html += '<span id="wc-' + f.id + '" class="word-count">' + wc + ' words</span>';
    html += '<button class="btn-clear-field" onclick="clearField(\'' + f.id + '\')">Clear</button>';
    html += '<button class="btn-copy" id="btn-' + f.id + '" onclick="copyText(\'' + f.id + '\')">Copy</button>';
    html += '</div>';
    html += '</div>';

    // Transcript references
    const refs = transcriptData[f.id];
    if (refs && refs.length > 0) {
      html += '<div class="transcript-section">';
      html += '<div class="draft-label">Transcript References</div>';
      refs.forEach(r => {
        html += '<div class="transcript-item">';
        html += '<button class="btn-copy-transcript" onclick="copyTranscript(`' + r.text.replace(/`/g, '\\`') + '`)">Copy</button>';
        html += '<div class="transcript-header">';
        html += '<span class="issue-label">' + escapeHtml(r.label) + '</span>';
        html += '<span class="badge-severity ' + sevClass(r.severity) + '">' + r.severity + '</span>';
        html += '</div>';
        html += '<div class="transcript-text">' + escapeHtml(r.text) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  });

  document.getElementById('app').innerHTML = html;
}

render();
</script>

</body>
</html>
