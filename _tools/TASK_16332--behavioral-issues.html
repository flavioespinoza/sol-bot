<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behavioral Issues</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    color: #333;
    padding: 32px;
    max-width: 1400px;
    margin: 0 auto;
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #1a1a1a;
  }
  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 32px;
  }
  .summary-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .summary-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 16px 24px;
    min-width: 160px;
  }
  .summary-card .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin-bottom: 4px;
  }
  .summary-card .value {
    font-size: 22px;
    font-weight: 700;
  }
  .model-section {
    margin-bottom: 40px;
  }
  .model-header {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid #e0e0e0;
  }
  .model-header.model-a { border-bottom-color: #3b82f6; }
  .model-header.model-b { border-bottom-color: #f59e0b; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
    font-size: 13px;
    table-layout: fixed;
  }
  thead { background: #f5f5f5; }
  th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: #555;
    border-bottom: 2px solid #e0e0e0;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid #f0f0f0;
    vertical-align: top;
    line-height: 1.5;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: #fafcff; }
  .col-num { width: 36px; }
  .col-type { width: 150px; }
  .col-tag { width: 160px; }
  .col-severity { width: 90px; }
  .col-desc { /* remaining space */ }
  .col-ref { width: 220px; }
  .tag {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    background: #f0f0f0;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
    word-break: break-all;
  }
  .severity {
    font-weight: 600;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
  }
  .severity.major { background: #fde8e8; color: #b91c1c; }
  .severity.minor { background: #fef3c7; color: #92400e; }
  .severity.observation { background: #e0e7ff; color: #3730a3; }
  .transcript-ref {
    font-size: 12px;
    color: #555;
    font-style: italic;
    line-height: 1.4;
  }
  .filter-bar {
    margin-bottom: 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 14px;
    border: 1px solid #d0d0d0;
    border-radius: 20px;
    background: #fff;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: #f5f5f5; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .import-bar {
    margin-bottom: 24px;
    display: flex;
    gap: 8px;
  }
  .import-bar button {
    padding: 8px 16px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    background: #fff;
    color: #374151;
    cursor: pointer;
    font-size: 13px;
  }
  .import-bar button:hover { background: #f3f4f6; }
  .empty-state {
    background: #fff;
    border: 2px dashed #d0d0d0;
    border-radius: 8px;
    padding: 48px;
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .empty-state code {
    display: block;
    margin-top: 12px;
    font-size: 12px;
    color: #555;
  }
  .paste-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .paste-overlay.show { display: flex; }
  .paste-box {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .paste-box h2 { font-size: 18px; font-weight: 600; }
  .paste-box textarea {
    width: 100%;
    height: 300px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 12px;
    resize: vertical;
  }
  .paste-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .paste-box button {
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid #d1d5db;
    background: #fff;
    color: #374151;
  }
  .paste-box button.primary {
    background: #1a1a1a;
    color: #fff;
    border-color: #1a1a1a;
  }
  .paste-box .error { color: #dc2626; font-size: 12px; min-height: 18px; }
</style>
</head>
<body>

<h1 id="page-title">Behavioral Issues</h1>
<p class="subtitle">Section 5: Behavioral Issues Log — Model A vs Model B</p>

<div class="import-bar">
  <button onclick="showPasteOverlay()">Import JSON</button>
  <button onclick="exportJSON()">Export JSON</button>
</div>

<div id="summary-bar" class="summary-bar"></div>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" onclick="filterRows('all')">All</button>
  <button class="filter-btn" onclick="filterRows('Major')">Major</button>
  <button class="filter-btn" onclick="filterRows('Minor')">Minor</button>
  <button class="filter-btn" onclick="filterRows('Observation')">Observation</button>
</div>

<div id="app"></div>

<!-- Paste JSON overlay -->
<div id="paste-overlay" class="paste-overlay">
  <div class="paste-box">
    <h2>Import JSON Data</h2>
    <textarea id="paste-area" placeholder='Paste your JSON here...'></textarea>
    <div id="paste-error" class="error"></div>
    <div class="btn-row">
      <button onclick="hidePasteOverlay()">Cancel</button>
      <button class="primary" onclick="loadFromPaste()">Load</button>
    </div>
  </div>
</div>

<!--
  DATA BLOCK — Claude Code fills this JSON for each task.
  Schema: see merc__template--behavioral-issues--schema.json
-->

<script>
const LS_KEY = 'merc_behavioral_issues';

function getData() {
  // localStorage overrides the inline block if present
  const stored = localStorage.getItem(LS_KEY);
  if (stored) {
    try { return JSON.parse(stored); } catch {}
  }
  const block = document.getElementById('task-data');
  try { return JSON.parse(block.textContent); } catch {}
  return { taskId: '', issues: [] };
}

function saveData(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}

function showPasteOverlay() {
  document.getElementById('paste-area').value = JSON.stringify(getData(), null, 2);
  document.getElementById('paste-error').textContent = '';
  document.getElementById('paste-overlay').classList.add('show');
}

function hidePasteOverlay() {
  document.getElementById('paste-overlay').classList.remove('show');
}

function loadFromPaste() {
  const raw = document.getElementById('paste-area').value;
  try {
    const data = JSON.parse(raw);
    if (!data.issues || !Array.isArray(data.issues)) {
      document.getElementById('paste-error').textContent = 'JSON must have an "issues" array.';
      return;
    }
    saveData(data);
    hidePasteOverlay();
    render();
  } catch (e) {
    document.getElementById('paste-error').textContent = 'Invalid JSON: ' + e.message;
  }
}

function exportJSON() {
  const data = getData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (data.taskId || 'behavioral-issues') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function filterRows(severity) {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.split(' ')[0] === (severity === 'all' ? 'All' : severity));
  });
  document.querySelectorAll('tbody tr').forEach(row => {
    if (severity === 'all') row.style.display = '';
    else row.style.display = row.dataset.severity === severity ? '' : 'none';
  });
}

function buildTableHTML(issues) {
  if (issues.length === 0) return '';
  let html = '<table><thead><tr>';
  html += '<th class="col-num">#</th>';
  html += '<th class="col-type">Issue Type</th>';
  html += '<th class="col-tag">Tag</th>';
  html += '<th class="col-severity">Severity</th>';
  html += '<th class="col-desc">Description</th>';
  html += '<th class="col-ref">Transcript Reference</th>';
  html += '</tr></thead><tbody>';
  issues.forEach(issue => {
    const sevLower = issue.severity.toLowerCase();
    html += '<tr data-severity="' + escapeHtml(issue.severity) + '">';
    html += '<td>' + issue.num + '</td>';
    html += '<td>' + escapeHtml(issue.type) + '</td>';
    html += '<td><span class="tag">' + escapeHtml(issue.tag) + '</span></td>';
    html += '<td><span class="severity ' + sevLower + '">' + escapeHtml(issue.severity) + '</span></td>';
    html += '<td>' + escapeHtml(issue.description) + '</td>';
    html += '<td class="transcript-ref">' + escapeHtml(issue.transcript) + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function render() {
  const data = getData();
  const issues = data.issues || [];

  // Title
  const title = data.taskId ? data.taskId + ' — Behavioral Issues' : 'Behavioral Issues';
  document.getElementById('page-title').textContent = title;
  document.title = title;

  // Empty state
  if (issues.length === 0) {
    document.getElementById('summary-bar').innerHTML = '';
    document.getElementById('app').innerHTML =
      '<div class="empty-state">No data loaded.<br>Click <strong>Import JSON</strong> to paste issue data, or have Claude Code fill the JSON block.<code>See merc__template--behavioral-issues--schema.json for the data shape.</code></div>';
    return;
  }

  // Split by model
  const modelA = issues.filter(i => i.model === 'A');
  const modelB = issues.filter(i => i.model === 'B');
  const majors = issues.filter(i => i.severity === 'Major').length;
  const minors = issues.filter(i => i.severity === 'Minor').length;
  const observations = issues.filter(i => i.severity === 'Observation').length;

  // Summary bar
  document.getElementById('summary-bar').innerHTML =
    '<div class="summary-card"><div class="label">Model A Total</div><div class="value">' + modelA.length + '</div></div>' +
    '<div class="summary-card"><div class="label">Model B Total</div><div class="value">' + modelB.length + '</div></div>' +
    '<div class="summary-card"><div class="label">Major</div><div class="value" style="color:#b91c1c;">' + majors + '</div></div>' +
    '<div class="summary-card"><div class="label">Minor</div><div class="value" style="color:#92400e;">' + minors + '</div></div>' +
    '<div class="summary-card"><div class="label">Observation</div><div class="value" style="color:#3730a3;">' + observations + '</div></div>';

  // Model sections
  const aMajors = modelA.filter(i => i.severity === 'Major').length;
  const aMinors = modelA.filter(i => i.severity === 'Minor').length;
  const aObs = modelA.filter(i => i.severity === 'Observation').length;
  const bMajors = modelB.filter(i => i.severity === 'Major').length;
  const bMinors = modelB.filter(i => i.severity === 'Minor').length;
  const bObs = modelB.filter(i => i.severity === 'Observation').length;

  let html = '';

  if (modelA.length > 0) {
    html += '<div class="model-section">';
    html += '<div class="model-header model-a">Model A — ' + modelA.length + ' Issues (' + aMajors + ' Major, ' + aMinors + ' Minor, ' + aObs + ' Observation)</div>';
    html += buildTableHTML(modelA);
    html += '</div>';
  }

  if (modelB.length > 0) {
    html += '<div class="model-section">';
    html += '<div class="model-header model-b">Model B — ' + modelB.length + ' Issues (' + bMajors + ' Major, ' + bMinors + ' Minor, ' + bObs + ' Observation)</div>';
    html += buildTableHTML(modelB);
    html += '</div>';
  }

  document.getElementById('app').innerHTML = html;
}

render();
</script>

</body>
</html>
